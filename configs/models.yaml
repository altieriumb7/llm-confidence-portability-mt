global:
  testset: wmt17
  langpair: en-de
  n: 500
  seed: 123
  temperature: 0.0
  openai_reasoning_effort: minimal
  max_output_tokens: 512
  translation_max_output_tokens: 512
  confidence_max_output_tokens: 256
  tau: 0.9
  mismatch_tau: 0.9
  conf_bins: 10
  timeout_s: 60
  max_retries: 6
  concurrency_per_provider: 2
  bootstrap_samples: 2000
  quality_metric_main: chrf
  error_quantile_within_model: 0.2
  error_quantile_global: 0.2
  mismatch_error_col: "error_within_model_q20"
  default_prompt_variant: canonical_v1
  prompt_variants:
    canonical_v1:
      translation_user_template: >-
        Translate English to German. Return JSON with exactly one key:
        {"translation":"..."}.

        SOURCE: {src}
      confidence_user_template: >-
        Rate translation correctness confidence from 0 to 1. Return JSON
        with exactly one key: {"confidence":0.73}.

        SOURCE: {src}
        TRANSLATION: {hyp}
    minimal_v2:
      translation_user_template: >-
        Task: English->German translation. Output must be one JSON object and
        only this key: {"translation":"..."}.

        English: {src}
      confidence_user_template: >-
        Task: estimate confidence that the German translation is correct.
        Respond with one JSON object and only this key: {"confidence":0.73}.

        English: {src}
        German translation: {hyp}
    verifier_v3:
      translation_user_template: >-
        Produce a faithful German translation of the sentence below.
        Return strict JSON with exactly one field {"translation":"..."}.

        SOURCE_SENTENCE: {src}
      confidence_user_template: >-
        Judge how likely the German translation preserves the source meaning.
        Return strict JSON with exactly one field {"confidence":0.73},
        where 0 is very unlikely and 1 is very likely.

        SOURCE_SENTENCE: {src}
        TRANSLATION_TO_JUDGE: {hyp}


  # Appendix C robustness variant: within-model bottom 10% chrF
  error_quantile_within_model_chrf_q10: 0.1
models:
  - provider: openai
    model_id: gpt-5.2
    label: OpenAI GPT-5.2
    tier: flagship

  - provider: openai
    model_id: gpt-5-mini
    label: OpenAI GPT-5 mini
    tier: efficient

  - provider: openai
    model_id: gpt-5-nano
    label: OpenAI GPT-5 nano
    tier: cheapest

  - provider: anthropic
    model_id: claude-opus-4-6
    label: Claude Opus 4.6
    tier: flagship

  - provider: anthropic
    model_id: claude-sonnet-4-5-20250929
    label: Claude Sonnet 4.5
    tier: balanced

  - provider: anthropic
    model_id: claude-haiku-4-5-20251001
    label: Claude Haiku 4.5
    tier: fastest

